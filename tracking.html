<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>WPS Tracking</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --black:#0b0b0b;
    --card:#1d1d1d;
    --white:#f5f5f5;
    --brown:#8b5e3c;
    --lightBrown:#b07d57;
    --gray:#9d9d9d;
    --border:rgba(255,255,255,0.05);
}

body{
    background:var(--black);
    color:var(--white);
    font-family:'Inter',sans-serif;
    padding:40px;
}

/* =========================
   HEADER
========================= */

.header{
    text-align:center;
    margin-bottom:50px;
}

.header h1{
    font-size:48px;
    font-family:'Playfair Display',serif;
}

.header p{
    margin-top:15px;
    color:var(--gray);
}

/* =========================
   SEARCH BOX
========================= */

.search-box{
    max-width:700px;
    margin:auto;
    background:var(--card);
    padding:30px;
    border-radius:30px;
    border:1px solid var(--border);
}

.search-box input{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#262626;
    color:white;
    font-size:15px;
}

.track-btn{
    width:100%;
    margin-top:20px;
    padding:18px;
    border:none;
    border-radius:18px;
    background:var(--brown);
    color:white;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.track-btn:hover{
    background:var(--lightBrown);
}

/* =========================
   RESULT BOX
========================= */

.result-box{
    max-width:700px;
    margin:40px auto 0;
    background:var(--card);
    padding:35px;
    border-radius:30px;
    border:1px solid var(--border);
    display:none;
}

.result-box h2{
    margin-bottom:20px;
    font-family:'Playfair Display',serif;
}

.result-info{
    line-height:2;
    color:#d7d7d7;
}

/* =========================
   STATUS
========================= */

.status{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    border-radius:40px;
    font-size:14px;
}

.pending{
    background:rgba(255,255,255,0.08);
    color:#d0d0d0;
}

.intransit{
    background:rgba(139,94,60,0.15);
    color:var(--lightBrown);
}

.delivered{
    background:rgba(0,255,100,0.1);
    color:#5dff99;
}

/* =========================
   TIMELINE
========================= */

.timeline{
    margin-top:30px;
    border-top:1px solid var(--border);
    padding-top:25px;
}

.timeline h3{
    margin-bottom:20px;
}

.timeline-item{
    margin-bottom:18px;
    padding-left:20px;
    border-left:2px solid var(--brown);
    color:#d7d7d7;
}

/* =========================
   NOT FOUND
========================= */

.not-found{
    margin-top:20px;
    color:#ff7777;
}

</style>
</head>

<body>

<div class="header">

    <h1>Track Shipment</h1>

    <p>
        Enter your tracking ID to monitor shipment progress
    </p>

</div>

<div class="search-box">

    <input
        type="text"
        id="trackingInput"
        placeholder="Enter Tracking ID"
    >

    <button
        class="track-btn"
        onclick="trackShipment()">

        Track Shipment

    </button>

</div>

<div
    class="result-box"
    id="resultBox">

    <h2 id="resultTitle">
        Shipment Details
    </h2>

    <div
        class="result-info"
        id="resultInfo">

    </div>

</div>

<script>

/* =========================
   TRACK SHIPMENT
========================= */

function trackShipment(){

    const trackingID =
        document.getElementById("trackingInput")
        .value.trim();

    const resultBox =
        document.getElementById("resultBox");

    const resultInfo =
        document.getElementById("resultInfo");

    let shipments =
        JSON.parse(localStorage.getItem("shipments"))
        || [];

    const shipment =
        shipments.find(item =>
            item.trackingID === trackingID
        );

    if(!shipment){

        resultBox.style.display = "block";

        resultInfo.innerHTML = `

            <div class="not-found">

                Tracking ID not found.

            </div>

        `;

        return;

    }

    let statusClass = "";

    if(shipment.status === "Pending"){

        statusClass = "pending";

    }
    else if(shipment.status === "In Transit"){

        statusClass = "intransit";

    }
    else{

        statusClass = "delivered";

    }

    resultBox.style.display = "block";

    resultInfo.innerHTML = `

        <p>
            <strong>Tracking ID:</strong>
            ${shipment.trackingID}
        </p>

        <p>
            <strong>Sender:</strong>
            ${shipment.sender}
        </p>

        <p>
            <strong>Receiver:</strong>
            ${shipment.receiver}
        </p>

        <p>
            <strong>Destination:</strong>
            ${shipment.destination}
        </p>

        <p>
            <strong>Package Type:</strong>
            ${shipment.packageType}
        </p>

        <p>
            <strong>Weight:</strong>
            ${shipment.weight}
        </p>

        <div class="status ${statusClass}">
            ${shipment.status}
        </div>

        <div class="timeline">

            <h3>Shipment Timeline</h3>

            <div class="timeline-item">
                Shipment Created
            </div>

            <div class="timeline-item">
                Shipment Processing
            </div>

            <div class="timeline-item">
                Current Status:
                ${shipment.status}
            </div>

        </div>

    `;

}

</script>

</body>
</html>
