<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Login</title>

<!-- GOOGLE FONTS -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --black:#0b0b0b;
    --card:#1a1a1a;
    --white:#f5f5f5;
    --brown:#8b5e3c;
    --lightBrown:#b07d57;
    --gray:#9d9d9d;
    --border:rgba(255,255,255,0.05);

}

body{

    background:var(--black);
    color:var(--white);
    font-family:'Inter',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
    padding:20px;

}

   .container{
    width:100%;
    max-width:1150px;
    min-height:700px;
    display:grid;
    grid-template-columns:1fr 1fr;
    background:rgba(255,255,255,0.02);
    border:1px solid var(--border);
    border-radius:35px;
    overflow:hidden;
    backdrop-filter:blur(15px);
}

/* =========================
   LEFT PANEL
========================= */

.left-panel{
    background:linear-gradient(135deg,#101010,#1a1a1a);
    padding:70px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo h2{
    font-family:'Playfair Display',serif;
    font-size:42px;
}

.logo p{
    color:var(--gray);
    letter-spacing:3px;
    margin-top:10px;
}

.left-panel{

    background:
    linear-gradient(
        135deg,
        rgba(16,16,16,0.96),
        rgba(28,28,28,0.92)
    );

    padding:80px;

    display:flex;
    flex-direction:column;
    justify-content:center;

    position:relative;
    overflow:hidden;

}

/* Decorative Glow */

.left-panel::before{

    content:"";

    position:absolute;

    width:450px;
    height:450px;

    background:rgba(176,125,87,0.08);

    border-radius:50%;

    top:-120px;
    right:-120px;

    filter:blur(20px);

}

.left-panel::after{

    content:"";

    position:absolute;

    width:250px;
    height:250px;

    background:rgba(255,255,255,0.03);

    border-radius:50%;

    bottom:-80px;
    left:-80px;

}

   .left-panel h1{

    font-size:64px;
    line-height:1.05;

    margin:45px 0 30px;

    font-family:'Playfair Display',serif;

    letter-spacing:-2px;

}

   .left-panel p{

    line-height:2;
    color:#d0d0d0;

    font-size:16px;

    max-width:500px;

}

   .right-panel{

    display:flex;
    align-items:center;
    justify-content:center;

    padding:60px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.01),
        rgba(255,255,255,0.03)
    );

}
   
/* =========================
   LOGIN CARD
========================= */

.login-card{

    width:100%;
    max-width:500px;

    background:
    linear-gradient(
        180deg,
        rgba(35,35,35,0.95),
        rgba(22,22,22,0.96)
    );

    border-radius:35px;

    border:1px solid rgba(255,255,255,0.06);

    padding:50px;

    box-shadow:
    0 25px 60px rgba(0,0,0,0.45);

    backdrop-filter:blur(12px);

}

/* =========================
   HEADER
========================= */

.login-header{

    text-align:center;
    margin-bottom:40px;

}

.login-header h1{

    font-family:'Playfair Display',serif;
    font-size:42px;
    margin-bottom:10px;

}

.login-header p{

    color:var(--gray);
    line-height:1.8;

}

/* =========================
   FORM
========================= */

.form-group input{

    width:100%;
    padding:18px 20px;

    border:1px solid transparent;
    outline:none;

    border-radius:18px;

    background:#262626;
    color:white;

    font-size:15px;

    transition:0.3s;

}

.form-group input:focus{

    border:1px solid var(--lightBrown);

    box-shadow:
    0 0 0 4px rgba(176,125,87,0.15);

}

   /* =========================
   FORM
========================= */

.form-group{

    margin-bottom:28px;

}

.form-group label{

    display:block;

    margin-bottom:12px;

    color:#d7d7d7;

    font-size:15px;

    font-weight:500;

    letter-spacing:0.3px;

}

.form-group input{

    width:100%;

    padding:20px 22px;

    border:1px solid transparent;

    outline:none;

    border-radius:18px;

    background:#262626;

    color:white;

    font-size:15px;

    transition:0.3s;

}

.form-group input:focus{

    border:1px solid var(--lightBrown);

    box-shadow:
    0 0 0 4px rgba(176,125,87,0.15);

}

/* =========================
   LOGIN CARD
========================= */

.login-card{

    width:100%;
    max-width:500px;

    background:
    linear-gradient(
        180deg,
        rgba(35,35,35,0.95),
        rgba(22,22,22,0.96)
    );

    border-radius:35px;

    border:1px solid rgba(255,255,255,0.06);

    padding:60px 50px;

    box-shadow:
    0 25px 60px rgba(0,0,0,0.45);

    backdrop-filter:blur(12px);

}

/* =========================
   HEADER
========================= */

.login-header{

    text-align:center;

    margin-bottom:45px;

}

.login-header h1{

    font-family:'Playfair Display',serif;

    font-size:42px;

    margin-bottom:14px;

}

.login-header p{

    color:var(--gray);

    line-height:1.9;

    font-size:15px;

}

/* =========================
   BUTTON
========================= */

.login-btn{

    width:100%;

    padding:20px;

    margin-top:10px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        var(--brown),
        var(--lightBrown)
    );

    color:white;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(176,125,87,0.25);

}

/* =========================
   BUTTON
========================= */

.login-btn{

    width:100%;

    padding:18px;

    border:none;
    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        var(--brown),
        var(--lightBrown)
    );

    color:white;

    font-size:15px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;

}

.login-btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(176,125,87,0.25);

}
/* =========================
   MESSAGE
========================= */

.message{

    margin-top:25px;
    text-align:center;
    color:#ff8a8a;

}

.success{

    color:#7dffb3;

}

   /* =========================
   RESPONSIVE
========================= */

@media(max-width:900px){

    .container{

        grid-template-columns:1fr;

    }

    .left-panel{

        padding:50px;
    }

    .left-panel h1{

        font-size:42px;
    }

    .right-panel{

        padding:30px;
    }

}

</style>
</head>

<body>

   <div class="container">

    <!-- LEFT -->

    <div class="left-panel">

        <div class="logo">
            <h2>WPS</h2>
            <p>WORLD POSTAL SERVICE</p>
        </div>

        <h1>
            Smart <span>Logistics</span> Delivery Ecosystem
        </h1>

        <p>
            Access shipment tracking, logistics management,
            delivery operations, and notification systems
            through one connected platform experience.
        </p>

    </div>


  <!-- RIGHT -->

<div class="right-panel">

    <div class="form-container">

       <div class="login-card">

    <div class="login-header">
    </div>

    <div id="loginForm">
    </div>

    <div id="signupForm">
    </div>

</div>
           <!-- LOGIN FORM -->

    <div id="loginForm">

        <div class="form-group">

            <label>
                Username
            </label>

            <input
                type="text"
                id="username"
                placeholder="Enter Username"
            >

        </div>

        <div class="form-group">

            <label>
                Password
            </label>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

        </div>

        <button
            class="login-btn"
            onclick="loginCustomer()">

            Login To Dashboard

        </button>

        <div
            style="
            text-align:center;
            margin-top:20px;
            color:#bdbdbd;
            ">

            No customer account?

            <span
                onclick="showSignup()"
                style="
                color:#b07d57;
                cursor:pointer;
                ">

                Create One

            </span>

        </div>

    </div>

    <!-- SIGNUP FORM -->

    <div
        id="signupForm"
        style="display:none;">

        <div class="form-group">

            <label>
                Create Username
            </label>

            <input
                type="text"
                id="newUsername"
                placeholder="Create Username"
            >

        </div>

        <div class="form-group">

            <label>
                Create Password
            </label>

            <input
                type="password"
                id="newPassword"
                placeholder="Create Password"
            >

        </div>

        <button
            class="login-btn"
            onclick="createCustomer()">

            Create Customer Account

        </button>

        <div
            style="
            text-align:center;
            margin-top:20px;
            color:#bdbdbd;
            ">

            Already have an account?

            <span
                onclick="showLogin()"
                style="
                color:#b07d57;
                cursor:pointer;
                ">

                Login

            </span>

        </div>

    </div>

    <!-- MESSAGE -->

    <div
        class="message"
        id="message">

    </div>

</div>
       </div>

    </div>

</div>

    

<!-- =========================
     JAVASCRIPT
========================= -->


<script>

/* =========================
   TOGGLE FORMS
========================= */


function showSignup(){

    document.getElementById("loginForm")
    .style.display = "none";

    document.getElementById("signupForm")
    .style.display = "block";

    document.getElementById("formTitle")
    .innerText = "Create Customer";

    document.getElementById("message")
    .innerHTML = "";

}

function showLogin(){

    document.getElementById("signupForm")
    .style.display = "none";

    document.getElementById("loginForm")
    .style.display = "block";

    document.getElementById("formTitle")
    .innerText = "Customer Login";

    document.getElementById("message")
    .innerHTML = "";

}

/* =========================
   CREATE Customer
========================= */

function createCustomer(){

    const username =
        document.getElementById("newUsername")
        .value.trim();

    const password =
        document.getElementById("newPassword")
        .value.trim();

    const message =
        document.getElementById("message");

    if(username === "" || password === ""){

        message.innerHTML =
            "Please fill all fields";

        return;

    }

    const existingUser =
        localStorage.getItem("customerUser");

    if(existingUser){

    const confirmReplace =
        confirm(
            "Customer account exists. Replace it?"
        );

    if(!confirmReplace){

        return;

    }

}localStorage.setItem(
        "customerUser",
        username
    );

    localStorage.setItem(
        "customerPass",
        password
    );

    message.innerHTML = `
        <span class="success">
            Customer Account Created Successfully
        </span>
    `;

    document.getElementById("newUsername")
    .value = "";

    document.getElementById("newPassword")
    .value = "";

    setTimeout(()=>{

        showLogin();

    },1500);

}

/* =========================
   LOGIN CUSTOMER
========================= */


function loginCustomer(){

    const username =
        document.getElementById("username")
        .value.trim();

    const password =
        document.getElementById("password")
        .value.trim();

    const message =
        document.getElementById("message");

    const savedUser =
        localStorage.getItem("customerUser");

    const savedPass =
        localStorage.getItem("customerPass");

    if(!savedUser || !savedPass){

        message.innerHTML =
            "No customer account found. Create one first.";

        return;

    }

    if(
        username === savedUser &&
        password === savedPass
    ){

        message.innerHTML = `
            <span class="success">
                Login Successful
            </span>
        `;

        localStorage.setItem(
            "customerLoggedIn",
            "true"
        );

        setTimeout(()=>{

            window.location.href =
            "World-Postal-Delivery-Service.html";

        },1500);

    }

    else{

        message.innerHTML =
            "Invalid Username or Password";

    }

}

/* =========================
   AUTO LOGIN CHECK
========================= */

if(
    localStorage.getItem("customerLoggedIn")
    === "true"
){

    console.log("Customer already logged in");

}
   
</script>
</body>
</html>
